name: Deploy to Server

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Deploy to Server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 2525
        script: |
          cd /var/www/iae-event-flow
          
          echo "📦 Pulling latest code..."
          git pull origin main
          
          echo "📥 Installing dependencies..."
          export BUN_INSTALL="$HOME/.bun"
          export PATH="$BUN_INSTALL/bin:$PATH"
          
          bun install
          cd backend && bun install && cd ..
          
          echo "🔨 Building..."
          bun run build
          cd backend && bun run build && cd ..
          
          echo "🔄 Restarting Backend..."
          # Load PM2 into PATH for non-interactive SSH sessions
          export PATH="$PATH:$(npm config get prefix)/bin"
          
          # Try restart, if it fails (first deploy), start fresh
          pm2 restart iae-event-flow-backend --update-env || \
          pm2 start backend/dist/main.js --name iae-event-flow-backend --interpreter $(which bun) --update-env
          
          # Save PM2 process list for reboots
          pm2 save
          
          echo "✅ Deployment Finished!"

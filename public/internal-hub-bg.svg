<svg xmlns="http://www.w3.org/2000/svg" width="2016" height="720" viewBox="0 0 2016 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="halo" cx="50%" cy="50%" r="62%">
      <stop offset="0%" stop-color="#3b3b3d" stop-opacity="0.78"/>
      <stop offset="24%" stop-color="#343436" stop-opacity="0.64"/>
      <stop offset="47%" stop-color="#1f1d20" stop-opacity="0.55"/>
      <stop offset="72%" stop-color="#100d11" stop-opacity="0.74"/>
      <stop offset="100%" stop-color="#0b080c" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="34%">
      <stop offset="0%" stop-color="#474749" stop-opacity="0.58"/>
      <stop offset="52%" stop-color="#373739" stop-opacity="0.34"/>
      <stop offset="100%" stop-color="#1a171b" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dotGrid" width="18" height="18" patternUnits="userSpaceOnUse">
      <rect x="1" y="1" width="7" height="7" rx="0.7" fill="#59595b"/>
    </pattern>
    <radialGradient id="dotFade" cx="50%" cy="50%" r="56%">
      <stop offset="0%" stop-color="white" stop-opacity="0.88"/>
      <stop offset="42%" stop-color="white" stop-opacity="0.82"/>
      <stop offset="68%" stop-color="white" stop-opacity="0.34"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <mask id="gridMask">
      <rect width="2016" height="720" fill="url(#dotFade)"/>
    </mask>
    <linearGradient id="edgeShade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0b080c"/>
      <stop offset="18%" stop-color="#0b080c" stop-opacity="0"/>
      <stop offset="82%" stop-color="#0b080c" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0b080c"/>
    </linearGradient>
  </defs>
  <rect width="2016" height="720" fill="#0b080c"/>
  <rect width="2016" height="720" fill="url(#halo)"/>
  <rect width="2016" height="720" fill="url(#dotGrid)" opacity="0.74" mask="url(#gridMask)"/>
  <ellipse cx="1008" cy="360" rx="245" ry="168" fill="url(#centerGlow)"/>
  <rect width="2016" height="720" fill="url(#edgeShade)" opacity="0.8"/>
